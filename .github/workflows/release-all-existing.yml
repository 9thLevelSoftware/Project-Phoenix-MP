name: Release All (Existing)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing GitHub release tag whose APK and IPA should be rebuilt'
        required: true
        type: string
      versionCodeOverride:
        description: 'Optional Android version code override (passed to both Android workflows)'
        required: false
        type: string
      submit_android_playstore_for_review:
        description: 'Submit Android Play Store edit for review immediately.'
        required: false
        type: boolean
        default: true
      skip_android_playstore:
        description: 'Skip Android Play Store'
        required: false
        type: boolean
        default: false
      skip_android_apk:
        description: 'Skip Android Release APK'
        required: false
        type: boolean
        default: false
      skip_ios_ipa:
        description: 'Skip iOS Release IPA'
        required: false
        type: boolean
        default: false
      skip_ios_testflight:
        description: 'Skip iOS TestFlight'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Verify workflow runs from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Run Release All (Existing) from main and provide the release tag as input." >&2
            exit 1
          fi
      - name: Verify release and remove prior assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null
          for asset in "ProjectPhoenix-$TAG.apk" "ProjectPhoenix-$TAG.ipa"; do
            if gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' | grep -Fxq "$asset"; then
              gh release delete-asset "$TAG" "$asset" --repo "${{ github.repository }}" --yes
              echo "Deleted existing asset $asset"
            else
              echo "Asset $asset was not present; continuing with rebuild."
            fi
          done

  android-apk:
    needs: prepare-release
    if: ${{ !inputs.skip_android_apk }}
    uses: ./.github/workflows/android-release-apk.yml
    with:
      source_ref: main
      release_tag: ${{ inputs.release_tag }}
      versionCodeOverride: ${{ inputs.versionCodeOverride }}
    secrets: inherit

  ios-ipa:
    needs: prepare-release
    if: ${{ !inputs.skip_ios_ipa }}
    uses: ./.github/workflows/ios-release-ipa.yml
    with:
      source_ref: main
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  android-playstore:
    needs: [prepare-release, android-apk, ios-ipa]
    if: ${{ !inputs.skip_android_playstore }}
    uses: ./.github/workflows/android-playstore.yml
    with:
      source_ref: main
      versionCodeOverride: ${{ inputs.versionCodeOverride }}
      submitForReview: ${{ inputs.submit_android_playstore_for_review }}
    secrets: inherit

  ios-testflight:
    needs: [prepare-release, android-apk, ios-ipa]
    if: ${{ !inputs.skip_ios_testflight }}
    uses: ./.github/workflows/ios-testflight.yml
    with:
      source_ref: main
    secrets: inherit

  summary:
    if: always()
    needs: [prepare-release, android-apk, ios-ipa, android-playstore, ios-testflight]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release All (Existing)" >> "$GITHUB_STEP_SUMMARY"
          echo "Release tag: ${{ inputs.release_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Only the APK and IPA assets were replaced; store builds were sourced from main." >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android Release APK | ${{ needs.android-apk.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS Release IPA | ${{ needs.ios-ipa.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android Play Store | ${{ needs.android-playstore.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS TestFlight | ${{ needs.ios-testflight.result }} |" >> "$GITHUB_STEP_SUMMARY"
