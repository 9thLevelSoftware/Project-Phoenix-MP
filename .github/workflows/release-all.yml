name: Release All Platforms

on:
  workflow_dispatch:
    inputs:
      versionCodeOverride:
        description: 'Optional Android version code override (passed to both Android workflows)'
        required: false
        type: string
      submit_android_playstore_for_review:
        description: 'Submit Android Play Store edit for review immediately.'
        required: false
        type: boolean
        default: true
      skip_android_playstore:
        description: 'Skip Android Play Store'
        required: false
        type: boolean
        default: false
      skip_android_apk:
        description: 'Skip Android Release APK'
        required: false
        type: boolean
        default: false
      skip_ios_ipa:
        description: 'Skip iOS Release IPA'
        required: false
        type: boolean
        default: false
      skip_ios_testflight:
        description: 'Skip iOS TestFlight'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Verify workflow runs from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Run Release All Platforms from main." >&2
            exit 1
          fi
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Determine release version
        id: version
        run: |
          set -euo pipefail
          ANDROID_VERSION="$(sed -nE 's/^[[:space:]]*versionName = "([^"]+)".*/\1/p' androidApp/build.gradle.kts | head -1)"
          IOS_VERSIONS="$(sed -nE 's/^[[:space:]]*MARKETING_VERSION = ([^;]+);/\1/p' iosApp/VitruvianPhoenix/VitruvianPhoenix.xcodeproj/project.pbxproj | sort -u)"
          if ! [[ "$ANDROID_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid Android versionName: '$ANDROID_VERSION'." >&2
            exit 1
          fi
          if [ "$(printf '%s\n' "$IOS_VERSIONS" | sed '/^$/d' | wc -l)" -ne 1 ] || [ "$IOS_VERSIONS" != "$ANDROID_VERSION" ]; then
            echo "Android and iOS marketing versions must match. Android='$ANDROID_VERSION'; iOS='$IOS_VERSIONS'." >&2
            exit 1
          fi
          TAG="v$ANDROID_VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Release tag $TAG already exists. Bump the app version on main before releasing." >&2
            exit 1
          fi
          LATEST="$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          if [ -n "${{ steps.version.outputs.latest }}" ]; then
            gh release create "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" --title "${{ steps.version.outputs.tag }}" --generate-notes --notes-start-tag "${{ steps.version.outputs.latest }}" --target "${{ steps.version.outputs.sha }}" --latest
          else
            gh release create "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" --title "${{ steps.version.outputs.tag }}" --generate-notes --target "${{ steps.version.outputs.sha }}" --latest
          fi

  android-apk:
    needs: create-release
    if: ${{ !inputs.skip_android_apk }}
    uses: ./.github/workflows/android-release-apk.yml
    with:
      source_ref: ${{ needs.create-release.outputs.tag }}
      release_tag: ${{ needs.create-release.outputs.tag }}
      versionCodeOverride: ${{ inputs.versionCodeOverride }}
    secrets: inherit
  ios-ipa:
    needs: create-release
    if: ${{ !inputs.skip_ios_ipa }}
    uses: ./.github/workflows/ios-release-ipa.yml
    with:
      source_ref: ${{ needs.create-release.outputs.tag }}
      release_tag: ${{ needs.create-release.outputs.tag }}
    secrets: inherit
  android-playstore:
    needs: [create-release, android-apk, ios-ipa]
    if: ${{ !inputs.skip_android_playstore }}
    uses: ./.github/workflows/android-playstore.yml
    with:
      source_ref: ${{ needs.create-release.outputs.tag }}
      versionCodeOverride: ${{ inputs.versionCodeOverride }}
      submitForReview: ${{ inputs.submit_android_playstore_for_review }}
    secrets: inherit
  ios-testflight:
    needs: [create-release, android-apk, ios-ipa]
    if: ${{ !inputs.skip_ios_testflight }}
    uses: ./.github/workflows/ios-testflight.yml
    with:
      source_ref: ${{ needs.create-release.outputs.tag }}
    secrets: inherit
  summary:
    if: always()
    needs: [create-release, android-apk, ios-ipa, android-playstore, ios-testflight]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release All Platforms" >> "$GITHUB_STEP_SUMMARY"
          echo "Release tag: ${{ needs.create-release.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "APK and IPA builds complete before store publication begins." >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android Release APK | ${{ needs.android-apk.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS Release IPA | ${{ needs.ios-ipa.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android Play Store | ${{ needs.android-playstore.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS TestFlight | ${{ needs.ios-testflight.result }} |" >> "$GITHUB_STEP_SUMMARY"
