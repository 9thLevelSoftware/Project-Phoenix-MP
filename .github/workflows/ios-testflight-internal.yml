name: iOS TestFlight (Internal Only)

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read

concurrency:
  group: ios-testflight-internal
  cancel-in-progress: true

env:
  BUNDLE_ID: com.devil.phoenixproject.projectphoenix
  SCHEME: VitruvianPhoenix
  PROJECT_PATH: iosApp/VitruvianPhoenix/VitruvianPhoenix.xcodeproj
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx8g -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g"

jobs:
  build-and-upload:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Write Supabase.xcconfig from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p iosApp/VitruvianPhoenix/Config
          {
            echo "SUPABASE_URL = $SUPABASE_URL"
            echo "SUPABASE_ANON_KEY = $SUPABASE_ANON_KEY"
          } > iosApp/VitruvianPhoenix/Config/Supabase.xcconfig

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-2.3.0-iosArm64
          restore-keys: |
            ${{ runner.os }}-konan-2.3.0-
            ${{ runner.os }}-konan-

      - name: Auto-increment build number
        id: build_number
        run: |
          # Generate build number from date and run number
          BUILD_NUM=$(date +%Y%m%d)${{ github.run_number }}
          echo "build_number=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "Build number: $BUILD_NUM"

          # Update Xcode project with new build number
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9][0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUM/g" \
            iosApp/VitruvianPhoenix/VitruvianPhoenix.xcodeproj/project.pbxproj

          # Show what was set
          grep "CURRENT_PROJECT_VERSION" iosApp/VitruvianPhoenix/VitruvianPhoenix.xcodeproj/project.pbxproj | head -2

      - name: Build shared framework and resources
        run: |
          # Single Gradle invocation — linkReleaseFrameworkIosArm64 already depends on
          # generateComposeResClass and resource processing, but listing them explicitly
          # ensures they run even if a dependency edge is missing. One JVM startup, not three.
          ./gradlew :shared:linkReleaseFrameworkIosArm64 \
            :shared:generateComposeResClass \
            :shared:iosArm64ProcessResources \
            --no-parallel -Pskip.supabase.check=true

          echo "=== Compose resource directories ==="
          find shared/build -type d -name "composeResources" 2>/dev/null | head -10

      - name: Copy Compose resources to Xcode project directory
        run: |
          # Compose MP's DefaultIOsResourceReader looks for resources in the
          # app's main bundle at compose-resources/composeResources/[module]/...
          # With isStatic=true, resources CANNOT live inside the framework — they
          # are lost during static linking. They must be in the app bundle root.
          #
          # Resources are placed OUTSIDE the Xcode fileSystemSynchronizedGroups
          # directory (at iosApp/VitruvianPhoenix/compose-resources/, not inside
          # VitruvianPhoenix/VitruvianPhoenix/) to prevent auto-inclusion that
          # flattens locale folders and causes .cvr filename collisions.
          # A Run Script Build Phase in the Xcode project copies them to the
          # bundle preserving directory structure.
          RESOURCE_DST="iosApp/VitruvianPhoenix/compose-resources"
          rm -rf "$RESOURCE_DST"
          mkdir -p "$RESOURCE_DST"

          # Copy processed compose resources into the compose-resources/ wrapper.
          # The CMP runtime expects: Bundle.main/compose-resources/composeResources/[module]/...
          PROCESSED="shared/build/processedResources/iosArm64/main"
          if [ -d "$PROCESSED/composeResources" ]; then
            cp -R "$PROCESSED/composeResources" "$RESOURCE_DST/"
            echo "=== Copied compose resources to Xcode project directory ==="
            find "$RESOURCE_DST" -type f | head -20
          else
            # Fallback: discover dynamically if processed path changed
            FOUND=false
            while IFS= read -r d; do
              if [ "$(find "$d" -type f 2>/dev/null | head -1)" ]; then
                echo "Found compose resources at: $d"
                cp -R "$d" "$RESOURCE_DST/"
                FOUND=true
                break
              fi
            done < <(find shared/build -type d -name composeResources \
              -not -path "*/releaseFramework/*" \
              -not -path "*/debugFramework/*" \
              -not -path "*/compose-resources/*" 2>/dev/null)

            if [ "$FOUND" = true ]; then
              echo "=== Copied compose resources (fallback) ==="
              find "$RESOURCE_DST" -type f | head -20
            else
              echo "ERROR: No compose resources found under shared/build!"
              find shared/build -type d -name "composeResources" 2>/dev/null
              exit 1
            fi
          fi

      - name: Create XCFramework
        run: |
          FRAMEWORK="shared/build/bin/iosArm64/releaseFramework/shared.framework"
          if [ ! -d "$FRAMEWORK" ]; then
            echo "ERROR: Framework not found at $FRAMEWORK"
            ls -la shared/build/bin/iosArm64/ 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi
          xcodebuild -create-xcframework \
            -framework "$FRAMEWORK" \
            -output shared/build/XCFrameworks/release/shared.xcframework

      - name: Link framework to Xcode path
        run: |
          mkdir -p shared/build/bin/iosArm64/debugFramework
          ln -sfn ../releaseFramework/shared.framework shared/build/bin/iosArm64/debugFramework/shared.framework

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install certificate and profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Archive app
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/VitruvianPhoenix.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}"

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/VitruvianPhoenix.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist iosApp/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -eo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

          IPA_PATH="$RUNNER_TEMP/export/VitruvianPhoenix.ipa"
          BUILD_VERSION="${{ steps.build_number.outputs.build_number }}"
          MARKETING_VERSION=$(grep 'MARKETING_VERSION' iosApp/VitruvianPhoenix/VitruvianPhoenix.xcodeproj/project.pbxproj | head -1 | sed 's/.*= //;s/;.*//')

          echo "=== Validating IPA before upload ==="
          echo "IPA: $IPA_PATH ($(du -h "$IPA_PATH" | cut -f1))"
          echo "Bundle ID: $BUNDLE_ID"
          echo "Build version: $BUILD_VERSION"
          echo "Marketing version: $MARKETING_VERSION"

          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"

          echo "=== Uploading IPA to App Store Connect ==="
          xcrun altool --upload-package "$IPA_PATH" \
            --type ios \
            --bundle-id "$BUNDLE_ID" \
            --bundle-version "$BUILD_VERSION" \
            --bundle-short-version-string "$MARKETING_VERSION" \
            --apple-id "${{ secrets.APP_APPLE_ID }}" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"

          echo ""
          echo "=== Build uploaded to TestFlight (internal only) ==="
          echo "Build number: $BUILD_VERSION"
          echo "The build will be available in TestFlight for internal testers after processing."
          echo "No external test group was added - this build is for internal testing only."

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
